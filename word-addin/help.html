<body class="help-page">
  <main>
    <p class="eyebrow">CCitecheck</p>
    <h1>法律引用核查</h1>
    <p>插件会读取当前 Word 文档，识别明确的法规与条文引用，完成本地法规库与北大法宝溯源、条文存在性/时效确定性判定和千问语义核验（默认开启）。支持核查全文或仅核查选中内容；每条结论可标记接受/忽略/转人工，并可导出核查报告随文件交付。</p>
    <h2>结果如何理解</h2>
    <ul>
      <li><strong>语义通过</strong>：未发现法源、原意、时效或结论支持性问题。</li>
      <li><strong>需核实</strong>：发现具体的法律引用风险。</li>
      <li><strong>无法判断</strong>：证据、版本或数据源不足，需要人工处理。</li>
    </ul>
  </main>
</body>
</html>
