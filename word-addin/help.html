<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>CCiteheck 项目简介</title>
  <link rel="stylesheet" href="/assets/taskpane.css">
</head>
<body class="help-page">
  <main>
    <p class="eyebrow">CCiteheck</p>
    <h1>项目简介与功能介绍</h1>
    <p>本插件会读取当前 Word 文档/选中部分，识别明确的法规或司法案例，每条结论可选择是否接受修订，并导出核查报告。</p>
    <h2>结果如何理解</h2>
    <ul>
      <li><strong>通过</strong>：法律引用无问题。</li>
      <li><strong>需核实</strong>：存在具体的法律引用风险。</li>
      <li><strong>无法判断</strong>：数据源不足，需人工处理。</li>
    </ul>
  </main>
</body>
</html>
