<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://appsforoffice.microsoft.com; script-src 'self' https://appsforoffice.microsoft.com; style-src 'self'; connect-src 'self'; img-src 'self' data:;">
  <title>CCiteheck</title>
  <link rel="stylesheet" href="/assets/taskpane.css">
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <button id="brand-button" class="brand" type="button" aria-label="返回首页">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>CCiteheck</span>
      </button>
      <div class="header-actions">
        <button id="help-button" class="icon-button" type="button" aria-label="项目简介与功能介绍" title="项目简介与功能介绍">?</button>
      </div>
    </header>

    <section id="home-screen" class="screen home-screen" aria-labelledby="home-title">
      <div class="hero" aria-hidden="true">CCiteheck</div>
      <h1 id="home-title" class="sr-only">CCiteheck 可验证主张核查</h1>
      <p class="hero-caption">可验证主张核查</p>

      <section class="current-document" aria-labelledby="current-document-title">
        <div class="section-label" id="current-document-title">当前文档</div>
        <div class="document-row">
          <div class="document-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7zM14 3v5h5"/></svg>
          </div>
          <div class="document-copy">
            <div id="document-name" class="document-name">正在读取 Word 文档…</div>
            <div id="document-status" class="document-status">正在连接插件</div>
          </div>
          <span id="connection-dot" class="connection-dot" aria-label="连接状态"></span>
        </div>
      </section>

      <section class="scope-section" aria-labelledby="scope-title">
        <div class="section-label" id="scope-title">核查范围</div>
        <div class="card scope-card">
          <label class="scope-row" for="statute-toggle">
            <div class="scope-copy">
              <strong>法律法规引用</strong>
            </div>
            <input id="statute-toggle" class="toggle" type="checkbox" checked>
          </label>
          <label class="scope-row" for="case-toggle">
            <div class="scope-copy">
              <strong>司法案例引用</strong>
            </div>
            <input id="case-toggle" class="toggle" type="checkbox" checked>
          </label>
        </div>
      </section>

      <section id="history-section" class="history-section is-hidden" aria-labelledby="history-title">
        <div class="section-label" id="history-title">最近核查</div>
        <div id="history-list" class="card history-list"></div>
      </section>

      <div class="bottom-action">
        <button id="start-button" class="primary-button" type="button" disabled>核查全文</button>
        <button id="selection-button" class="secondary-button" type="button" disabled>核查选中内容</button>
      </div>
    </section>

    <section id="progress-screen" class="screen progress-screen is-hidden" aria-labelledby="progress-title">
      <div class="progress-orbit" aria-hidden="true">
        <span class="orbit-ring"></span>
        <span class="orbit-track"><span class="orbit-dot"></span></span>
      </div>
      <h1 id="progress-title">正在核查法律引用</h1>
      <p id="progress-subtitle" class="progress-subtitle">请保持当前文档打开</p>
      <ol class="progress-list">
        <li id="stage-read" class="progress-stage is-active">
          <span class="stage-marker"></span>
          <div><strong>文档结构解析</strong><small>正在获取完整 DOCX</small></div>
        </li>
        <li id="stage-submit" class="progress-stage">
          <span class="stage-marker"></span>
          <div><strong>提交核验任务</strong><small>等待执行</small></div>
        </li>
        <li id="stage-check" class="progress-stage">
          <span class="stage-marker"></span>
          <div><strong>规章条款与语义核验</strong><small>等待执行</small></div>
        </li>
        <li id="stage-report" class="progress-stage">
          <span class="stage-marker"></span>
          <div><strong>生成核查报告</strong><small>等待执行</small></div>
        </li>
      </ol>
    </section>

    <section id="results-screen" class="screen results-screen is-hidden" aria-labelledby="results-title">
      <div class="results-heading">
        <h1 id="results-title">核查结果</h1>
        <p id="results-subtitle" class="results-subtitle"></p>
      </div>
      <div class="results-filters">
        <div id="status-filter" class="status-filter" role="tablist" aria-label="按核查状态筛选"></div>
        <div class="filter-tools">
          <select id="type-filter" class="type-filter" aria-label="按问题类型筛选">
            <option value="">全部类型</option>
          </select>
          <button id="rerun-button" class="text-button" type="button">重新核查</button>
        </div>
      </div>
      <div id="results-list" class="results-list"></div>
      <div class="results-action">
        <button id="export-button" class="primary-button" type="button">导出核查报告</button>
      </div>
    </section>

    <div id="message" class="message is-hidden" role="alert"></div>
  </main>
  <script type="module" src="/assets/taskpane.js"></script>
</body>
</html>
