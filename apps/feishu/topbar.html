<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCiteheck 法律引用核查</title>
  <link rel="stylesheet" href="./assets/addon.css">
</head>
<body>
  <main class="checker" aria-live="polite">
    <header class="checker-header">
      <button id="brand-button" class="brand" type="button" aria-label="返回首页">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>CCiteheck</span>
      </button>
      <button id="minimize-button" class="icon-button" type="button" aria-label="最小化" title="最小化">—</button>
    </header>

    <section id="start-view" class="view start-view">
      <div class="hero" aria-hidden="true">CCiteheck</div>
      <h1 class="sr-only">CCiteheck 可验证主张核查</h1>
      <p class="hero-caption">可验证主张核查</p>

      <section aria-labelledby="current-document-title">
        <div class="section-label" id="current-document-title">当前文档</div>
        <div class="document-row">
          <div class="document-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7zM14 3v5h5"/></svg>
          </div>
          <div class="document-copy">
            <div id="document-name" class="document-name">当前飞书文档</div>
            <div id="document-status" class="document-status">已连接 · 可开始核查</div>
          </div>
          <span class="connection-dot is-ready" aria-label="已连接"></span>
        </div>
      </section>

      <section class="scope-section" aria-labelledby="scope-title">
        <div class="section-label" id="scope-title">核查范围</div>
        <div class="card scope-card">
          <label class="scope-row" for="statute-toggle"><div class="scope-copy"><strong>法律法规引用</strong></div><input id="statute-toggle" class="toggle" type="checkbox" checked></label>
          <label class="scope-row" for="case-toggle"><div class="scope-copy"><strong>司法案例引用</strong></div><input id="case-toggle" class="toggle" type="checkbox" checked></label>
        </div>
      </section>

      <div class="bottom-action">
        <button id="start-button" class="primary-button" type="button">核查全文</button>
      </div>
    </section>

    <section id="progress-view" class="view progress-view is-hidden">
      <div class="progress-orbit" aria-hidden="true"><span class="orbit-ring"></span><span class="orbit-track"></span></div>
      <h1>正在核查法律引用</h1>
      <p class="progress-subtitle">请保持当前文档打开 · <span id="progress-count">0 / 24</span></p>
      <div class="sr-only" aria-hidden="true"><span id="progress-bar"></span></div>
      <ol class="stages progress-list">
        <li data-stage="structure" class="progress-stage"><span class="stage-marker"></span><div><b>文档结构解析</b><small>正在读取飞书文档块</small></div></li>
        <li data-stage="submit" class="progress-stage"><span class="stage-marker"></span><div><b>提交核验任务</b><small>等待执行</small></div></li>
        <li data-stage="source" class="progress-stage"><span class="stage-marker"></span><div><b>规章条款与语义核验</b><small>等待执行</small></div></li>
        <li data-stage="report" class="progress-stage"><span class="stage-marker"></span><div><b>生成核查结果</b><small>等待执行</small></div></li>
      </ol>
      <button id="background-button" class="secondary-button" type="button">转到后台继续核查</button>
    </section>

    <section id="results-view" class="view results-view is-hidden">
      <div class="results-heading">
        <h1 id="results-title">核查完成</h1>
        <p id="results-subtitle" class="results-subtitle"></p>
      </div>
      <div class="results-filters">
        <div id="status-filter" class="status-filter" role="tablist" aria-label="按核查状态筛选"></div>
        <div class="filter-tools">
          <select id="type-filter" class="type-filter" aria-label="按问题类型筛选"><option value="">全部类型</option></select>
          <button id="rerun-button" class="text-button" type="button">重新核查</button>
        </div>
      </div>
      <div id="results-list" class="results-list"></div>
    </section>

    <div id="toast" class="toast is-hidden" role="alert"></div>
  </main>
  <script type="module" src="./assets/sdk-entry.js"></script>
</body>
</html>
